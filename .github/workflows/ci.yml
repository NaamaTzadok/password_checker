name: CI
on: [push, pull_request]
jobs:
  matrix_quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-versions: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-versions }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Run linter (Ruff)
        run: uv run ruff check .
      - name: Check code formatting (Ruff) 
        run: uv run ruff format --check .
      - name: Run type checker
        run: uv run ty check
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-fail-under=80 --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: NaamaTzadok/password_checker
  quality:
    runs-on: ubuntu-latest
    needs: matrix_quality
    steps:
      - run: true
  publish:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Install uv 
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build package
        run: uv build
      - name: Publish package to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ --token ${{ secrets.TEST_PYPI_TOKEN }}

